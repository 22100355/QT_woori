<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wanted Photo Booth</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Poppins:wght@400;600;700;800&family=Rye&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #f5c842;
      --accent-strong: #ffdd57;
      --ink: #21140b;
      --wood: #513018;
      --wood-dark: #23150d;
      --paper: #050505;
      --paper-deep: #242424;
      --danger: #b93225;
      --green: #4daf6f;
      --panel: rgba(20, 16, 13, 0.88);
      --panel-soft: rgba(55, 36, 23, 0.72);
      --line: rgba(245, 200, 66, 0.28);
      --pad: 20px;
    }

    * { box-sizing: border-box; }

    html { color-scheme: dark; }

    body {
      min-height: 100dvh;
      margin: 0;
      font-family: "Poppins", "Black Han Sans", sans-serif;
      color: #fff8e7;
      background:
        linear-gradient(rgba(17, 9, 4, 0.56), rgba(17, 9, 4, 0.72)),
        url("main_bg.jpeg"),
        radial-gradient(circle at top left, #74451e, #170d08 60%);
      background-size: cover, cover, cover;
      background-position: center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      mix-blend-mode: soft-light;
    }

    button, input { font: inherit; }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: calc(var(--pad) + env(safe-area-inset-top))
               calc(var(--pad) + env(safe-area-inset-right))
               calc(var(--pad) + env(safe-area-inset-bottom))
               calc(var(--pad) + env(safe-area-inset-left));
    }

    body:not(.frame-selected) .booth-view { display: none; }
    body.frame-selected .frame-start { display: none; }

    .frame-start {
      min-height: calc(100dvh - var(--pad) * 2);
      display: grid;
      align-content: center;
      gap: 24px;
    }

    .start-head {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
    }

    .start-copy h1 { margin-bottom: 8px; }

    .start-copy p {
      margin: 0;
      color: #f7efe0;
      font-size: clamp(1rem, 2vw, 1.18rem);
      font-weight: 700;
    }

    .frame-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .frame-card {
      min-height: 220px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 16px;
      border: 2px solid rgba(245, 200, 66, 0.28);
      border-radius: 12px;
      background: rgba(20, 16, 13, 0.88);
      color: #fff8e7;
      box-shadow: 0 18px 42px rgba(0,0,0,0.38);
      cursor: pointer;
      text-align: left;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .frame-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      background: rgba(41, 28, 18, 0.94);
    }

    .frame-sample {
      display: grid;
      place-items: center;
      min-height: 126px;
      padding: 12px;
      border-radius: 8px;
      background: #050505;
      border: 8px solid rgba(107, 53, 24, 0.9);
    }

    .frame-sample canvas {
      width: auto;
      max-width: 240px;
      max-height: 138px;
      height: auto;
      border: 0;
      border-radius: 3px;
      box-shadow: none;
      background: #050505;
    }

    .frame-meta strong {
      display: block;
      color: var(--accent);
      font-family: "Rye", cursive;
      font-size: clamp(1.25rem, 2.6vw, 1.8rem);
      line-height: 1;
      margin-bottom: 8px;
    }

    .frame-meta span {
      display: block;
      color: #f7efe0;
      font-size: 13px;
      font-weight: 800;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      background: rgba(33, 20, 11, 0.82);
      box-shadow: inset 0 0 0 5px rgba(245, 200, 66, 0.12), 0 12px 30px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-fallback {
      font-family: "Rye", cursive;
      font-size: 28px;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-family: "Rye", cursive;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.98;
      letter-spacing: 0;
      color: var(--accent);
      text-shadow: 0 5px 0 rgba(0,0,0,0.3), 0 0 24px rgba(245, 200, 66, 0.25);
      word-break: keep-all;
    }

    .session-badge {
      min-width: 148px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 12, 8, 0.72);
      text-align: right;
      box-shadow: 0 10px 26px rgba(0,0,0,0.25);
    }

    .session-badge span {
      display: block;
      color: var(--paper);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .session-badge strong {
      color: var(--accent-strong);
      font-family: "Rye", cursive;
      font-size: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 3px solid var(--wood);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(0,0,0,0.58);
      overflow: clip;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(81,48,24,0.88), rgba(31,18,10,0.76));
    }

    .panel-title {
      margin: 0;
      font-family: "Rye", cursive;
      font-size: clamp(1.15rem, 2vw, 1.55rem);
      color: var(--accent);
      letter-spacing: 0;
    }

    .live-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--paper);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(185, 50, 37, 0.18);
    }

    .live-status.ready .live-dot {
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(77, 175, 111, 0.18);
    }

    .camera-body { padding: 18px; }

    .screen {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border: 5px solid var(--wood);
      border-radius: 12px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 45%),
        #080604;
      max-height: 58dvh;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: rgba(255,248,231,0.8);
      background:
        linear-gradient(45deg, rgba(245,200,66,0.06) 25%, transparent 25% 50%, rgba(245,200,66,0.06) 50% 75%, transparent 75%),
        #100b07;
      background-size: 28px 28px;
    }

    .camera-placeholder.hidden { display: none; }

    .camera-placeholder strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      font-family: "Rye", cursive;
      font-size: clamp(1.4rem, 4vw, 2.5rem);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 36%, rgba(0,0,0,0.18));
    }

    .countdown {
      font-family: "Rye", cursive;
      font-size: clamp(5rem, 18vw, 10rem);
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 26px rgba(245, 200, 66, 0.72), 0 8px 0 rgba(0,0,0,0.42);
    }

    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    .flash.on { animation: flash 420ms ease-out; }

    @keyframes flash {
      0% { opacity: 0; }
      18% { opacity: 0.88; }
      100% { opacity: 0; }
    }

    .workflow {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .step {
      min-height: 58px;
      padding: 10px;
      border: 1px solid rgba(245, 200, 66, 0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      color: rgba(255,248,231,0.66);
    }

    .step strong {
      display: block;
      color: currentColor;
      font-size: 13px;
      line-height: 1.25;
    }

    .step span {
      color: inherit;
      font-size: 12px;
    }

    .step.active {
      border-color: var(--accent);
      background: rgba(245, 200, 66, 0.14);
      color: var(--accent-strong);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 12px 14px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: var(--wood);
      color: var(--accent);
      font-family: "Rye", "Black Han Sans", cursive;
      font-size: clamp(0.98rem, 2.2vw, 1.35rem);
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, opacity 160ms ease;
      touch-action: manipulation;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--ink);
    }

    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.48; cursor: not-allowed; }
    .btn.secondary { border-color: rgba(255,248,231,0.44); color: #fff8e7; background: rgba(255,255,255,0.08); }
    .btn.danger { border-color: #fff8e7; background: var(--danger); color: #fff8e7; }

    .notice {
      min-height: 26px;
      margin: 12px 0 0;
      color: var(--paper);
      font-size: 14px;
      font-weight: 700;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .thumb {
      position: relative;
      display: block;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border: 3px solid transparent;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      opacity: 0.72;
      transition: transform 160ms ease, opacity 160ms ease, border-color 160ms ease;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb::before {
      content: attr(data-number);
      position: absolute;
      top: 6px;
      left: 6px;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.62);
      color: #fff8e7;
      font-weight: 800;
      font-size: 13px;
    }

    .thumb.selected {
      opacity: 1;
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .thumb.selected::after {
      content: attr(data-order);
      position: absolute;
      right: 6px;
      bottom: 6px;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--ink);
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .preview-body {
      padding: 18px;
      text-align: center;
    }

    .poster-wrap {
      display: grid;
      place-items: center;
      min-height: 420px;
      padding: 12px;
      border: 1px dashed rgba(245, 200, 66, 0.32);
      border-radius: 10px;
      background:
        linear-gradient(rgba(255,255,255,0.04), rgba(0,0,0,0.08)),
        rgba(0,0,0,0.16);
    }

    canvas {
      display: block;
      width: min(100%, 520px);
      height: auto;
      border: 0;
      border-radius: 6px;
      background: var(--paper);
      box-shadow: 0 16px 36px rgba(0,0,0,0.38);
      cursor: pointer;
    }

    .save-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .mini-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .option {
      min-height: 42px;
      border: 1px solid rgba(245, 200, 66, 0.24);
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      color: #fff8e7;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .option.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 200, 66, 0.12);
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .frame-grid { grid-template-columns: repeat(2, 1fr); }
      .poster-wrap { min-height: 320px; }
      .preview-panel { position: static; }
    }

    @media (min-width: 1081px) {
      .preview-panel {
        position: sticky;
        top: calc(16px + env(safe-area-inset-top));
      }
    }

    @media (max-width: 720px) {
      :root { --pad: 12px; }
      body { background-attachment: scroll; }
      .topbar {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }
      .start-head {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }
      .frame-grid { grid-template-columns: 1fr; }
      .frame-card { min-height: 176px; }
      .brand-mark { width: 64px; height: 64px; }
      .session-badge { width: 100%; text-align: center; }
      .panel-header { align-items: flex-start; }
      .workflow { grid-template-columns: repeat(2, 1fr); }
      .controls, .save-row { grid-template-columns: 1fr; }
      .thumbs { grid-template-columns: repeat(3, 1fr); }
      .screen { border-width: 4px; }
      .save-row {
        position: sticky;
        bottom: calc(10px + env(safe-area-inset-bottom));
        z-index: 5;
      }
    }

    @media (max-width: 430px) {
      .thumbs { grid-template-columns: repeat(2, 1fr); }
      .mini-options { grid-template-columns: 1fr; }
      .panel-header { flex-direction: column; }
      .live-status { white-space: normal; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="frame-start" aria-label="프레임 선택">
      <div class="start-head">
        <div class="brand-mark" aria-label="Wanted Photo Booth logo">
          <img src="logo.png" alt="" onerror="const parent = this.parentElement; this.remove(); parent.insertAdjacentHTML('beforeend', '<span class=&quot;brand-fallback&quot;>W</span>');" />
        </div>
        <div class="start-copy">
          <h1>WHAT IS YOUR NAME</h1>
          <p>원하는 프레임을 선택하고 촬영을 시작하세요.</p>
        </div>
      </div>

      <div class="frame-grid">
        <button class="frame-card" data-frame="single">
          <span class="frame-sample" data-layout="single"><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>1-CUT</strong><span>3장 촬영 / 1장 선택</span></span>
        </button>
        <button class="frame-card" data-frame="double">
          <span class="frame-sample" data-layout="double"><i class="sample-slot"></i><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>2-CUT</strong><span>4장 촬영 / 2장 선택</span></span>
        </button>
        <button class="frame-card" data-frame="classic4">
          <span class="frame-sample" data-layout="four"><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>4-CUT</strong><span>6장 촬영 / 4장 선택</span></span>
        </button>
        <button class="frame-card" data-frame="wide4">
          <span class="frame-sample" data-layout="wide"><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>WIDE 4</strong><span>6장 촬영 / 4장 선택</span></span>
        </button>
        <button class="frame-card" data-frame="six">
          <span class="frame-sample" data-layout="six"><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>6-CUT</strong><span>8장 촬영 / 6장 선택</span></span>
        </button>
        <button class="frame-card" data-frame="eight">
          <span class="frame-sample" data-layout="eight"><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i><i class="sample-slot"></i></span>
          <span class="frame-meta"><strong>8-CUT</strong><span>10장 촬영 / 8장 선택</span></span>
        </button>
      </div>
    </section>

    <header class="topbar booth-view">
      <div class="brand-mark" aria-label="Wanted Photo Booth logo">
        <img src="logo.png" alt="" onerror="const parent = this.parentElement; this.remove(); parent.insertAdjacentHTML('beforeend', '<span class=&quot;brand-fallback&quot;>W</span>');" />
      </div>
      <h1>WHAT IS YOUR NAME</h1>
      <div class="session-badge">
        <span>Session</span>
        <strong id="sessionId">0001</strong>
      </div>
    </header>

    <section class="layout booth-view">
      <div class="panel camera-panel">
        <div class="panel-header">
          <h2 class="panel-title" id="shootingTitle">Shooting Booth</h2>
          <div id="cameraStatus" class="live-status">
            <span class="live-dot"></span>
            <span>카메라 준비 중</span>
          </div>
        </div>

        <div class="camera-body">
          <div class="screen">
            <video id="video" autoplay playsinline muted></video>
            <div id="cameraPlaceholder" class="camera-placeholder">
              <div>
                <strong>CAMERA STANDBY</strong>
                <span>권한을 허용하면 촬영 화면이 표시됩니다.</span>
              </div>
            </div>
            <div class="overlay">
              <div id="countdown" class="countdown"></div>
            </div>
            <div id="flash" class="flash"></div>
          </div>

          <div class="workflow" aria-label="촬영 단계">
            <div class="step active" data-step="ready"><strong>Ready</strong><span>카메라 확인</span></div>
            <div class="step" data-step="shoot"><strong>Shoot</strong><span id="shootStepText">8장 촬영</span></div>
            <div class="step" data-step="select"><strong>Select</strong><span id="selectStepText">6장 선택</span></div>
            <div class="step" data-step="save"><strong>Save</strong><span>저장/공유</span></div>
          </div>

          <div class="controls">
            <button id="startBtn" class="btn">START SHOOTING</button>
            <button id="retakeBtn" class="btn secondary" disabled>RESET</button>
            <button id="changeFrameBtn" class="btn secondary">CHANGE FRAME</button>
          </div>

          <p id="notice" class="notice">카메라 권한을 허용한 뒤 촬영을 시작하세요.</p>
          <div id="thumbs" class="thumbs" aria-label="촬영된 사진 목록"></div>
        </div>
      </div>

      <aside id="previewPanel" class="panel preview-panel">
        <div class="panel-header">
          <h2 class="panel-title" id="previewTitle">Wanted Poster</h2>
          <div class="live-status ready">
            <span class="live-dot"></span>
            <span id="selectionCount">0 / 6 선택</span>
          </div>
        </div>

        <div class="preview-body">
          <div class="poster-wrap">
            <canvas id="finalCanvas" width="1200" height="1800"></canvas>
          </div>

          <div class="mini-options" aria-label="프레임 스타일 선택">
            <button class="option active" data-theme="classic">CLASSIC</button>
            <button class="option" data-theme="red">RED</button>
            <button class="option" data-theme="mono">MONO</button>
          </div>

          <div class="save-row">
            <button id="saveBtn" class="btn danger" disabled>SAVE PNG</button>
            <button id="shareBtn" class="btn secondary" disabled>SHARE</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const startBtn = document.getElementById("startBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const saveBtn = document.getElementById("saveBtn");
    const shareBtn = document.getElementById("shareBtn");
    const changeFrameBtn = document.getElementById("changeFrameBtn");
    const countdownEl = document.getElementById("countdown");
    const thumbs = document.getElementById("thumbs");
    const notice = document.getElementById("notice");
    const finalCanvas = document.getElementById("finalCanvas");
    const finalCtx = finalCanvas.getContext("2d");
    const previewPanel = document.getElementById("previewPanel");
    const cameraStatus = document.getElementById("cameraStatus");
    const cameraPlaceholder = document.getElementById("cameraPlaceholder");
    const selectionCount = document.getElementById("selectionCount");
    const flash = document.getElementById("flash");
    const sessionId = document.getElementById("sessionId");
    const shootingTitle = document.getElementById("shootingTitle");
    const previewTitle = document.getElementById("previewTitle");
    const shootStepText = document.getElementById("shootStepText");
    const selectStepText = document.getElementById("selectStepText");
    const frameCards = [...document.querySelectorAll(".frame-card")];
    const themeButtons = [...document.querySelectorAll(".option")];
    const steps = [...document.querySelectorAll(".step")];

    const FRAME_PRESETS = {
      single: { id: "single", label: "1-CUT", shots: 3, selections: 1, cols: 1, rows: 1, layout: "single", width: 1200, height: 1600, subtitle: "PROFILE WANTED" },
      double: { id: "double", label: "2-CUT", shots: 4, selections: 2, cols: 1, rows: 2, layout: "strip", width: 760, height: 1600, subtitle: "DOUBLE WANTED" },
      classic4: { id: "classic4", label: "4-CUT", shots: 6, selections: 4, cols: 1, rows: 4, layout: "strip", width: 640, height: 1900, subtitle: "CLASSIC FOUR CUTS" },
      wide4: { id: "wide4", label: "WIDE 4", shots: 6, selections: 4, cols: 2, rows: 2, layout: "wide", width: 1600, height: 1200, subtitle: "WIDE FOUR CUTS" },
      six: { id: "six", label: "6-CUT", shots: 8, selections: 6, cols: 2, rows: 3, layout: "grid", width: 1200, height: 1800, subtitle: "SELECTED SIX CUTS" },
      eight: { id: "eight", label: "8-CUT", shots: 10, selections: 8, cols: 2, rows: 4, layout: "mini", width: 1160, height: 2100, subtitle: "MINI EIGHT CUTS" }
    };

    let currentFrame = FRAME_PRESETS.six;
    let capturedPhotos = [];
    let selectedPhotos = Array(currentFrame.selections).fill(null);
    let isShooting = false;
    let activeTheme = "classic";
    let stream = null;
    let posterRenderId = 0;

    sessionId.textContent = String(Math.floor(Math.random() * 9000) + 1000);

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function selectedCount() {
      return selectedPhotos.filter(Boolean).length;
    }

    function firstEmptySlot() {
      return selectedPhotos.findIndex((photo) => !photo);
    }

    function setStep(name) {
      steps.forEach((step) => step.classList.toggle("active", step.dataset.step === name));
    }

    function setCameraStatus(text, ready = false) {
      cameraStatus.classList.toggle("ready", ready);
      cameraStatus.querySelector("span:last-child").textContent = text;
    }

    function applyFrame(frameId) {
      currentFrame = FRAME_PRESETS[frameId] || FRAME_PRESETS.six;
      document.body.classList.add("frame-selected");
      sessionId.textContent = String(Math.floor(Math.random() * 9000) + 1000);
      shootingTitle.textContent = `${currentFrame.label} Shooting`;
      previewTitle.textContent = `${currentFrame.label} Poster`;
      shootStepText.textContent = `${currentFrame.shots}장 촬영`;
      selectStepText.textContent = `${currentFrame.selections}장 선택`;
      resetSession();
      if (!stream) initCamera();
    }

    function showFrameSelect() {
      if (isShooting) return;
      document.body.classList.remove("frame-selected");
      resetSession();
    }

    async function initCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setCameraStatus("카메라 미지원", false);
        notice.textContent = "현재 브라우저는 카메라 촬영을 지원하지 않습니다.";
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 960 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        cameraPlaceholder.classList.add("hidden");
        setCameraStatus("카메라 연결됨", true);
        notice.textContent = `START SHOOTING을 누르면 5초 간격으로 ${currentFrame.shots}장을 촬영합니다.`;
      } catch (error) {
        setCameraStatus("권한 필요", false);
        notice.textContent = "브라우저 주소창의 카메라 권한을 허용한 뒤 새로고침하세요.";
      }
    }

    function resetSession() {
      capturedPhotos = [];
      selectedPhotos = Array(currentFrame.selections).fill(null);
      isShooting = false;
      thumbs.innerHTML = "";
      countdownEl.textContent = "";
      startBtn.disabled = false;
      retakeBtn.disabled = true;
      updateReadyState();
      setStep("ready");
      drawPoster();
      notice.textContent = stream ? `START SHOOTING을 누르면 5초 간격으로 ${currentFrame.shots}장을 촬영합니다.` : "카메라 권한을 허용한 뒤 촬영을 시작하세요.";
    }

    function updateReadyState() {
      const count = selectedCount();
      const ready = count === currentFrame.selections;
      selectionCount.textContent = `${count} / ${currentFrame.selections} 선택`;
      saveBtn.disabled = !ready;
      shareBtn.disabled = !ready || !navigator.share;
      if (ready) setStep("save");
    }

    function flashScreen() {
      flash.classList.remove("on");
      void flash.offsetWidth;
      flash.classList.add("on");
    }

    function captureFrame() {
      const capCanvas = document.createElement("canvas");
      capCanvas.width = 1200;
      capCanvas.height = 900;
      const ctx = capCanvas.getContext("2d");
      ctx.translate(capCanvas.width, 0);
      ctx.scale(-1, 1);

      if (video.readyState >= 2 && video.videoWidth && video.videoHeight) {
        const sourceRatio = video.videoWidth / video.videoHeight;
        const targetRatio = capCanvas.width / capCanvas.height;
        let sx = 0;
        let sy = 0;
        let sw = video.videoWidth;
        let sh = video.videoHeight;

        if (sourceRatio > targetRatio) {
          sw = video.videoHeight * targetRatio;
          sx = (video.videoWidth - sw) / 2;
        } else {
          sh = video.videoWidth / targetRatio;
          sy = (video.videoHeight - sh) / 2;
        }

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, capCanvas.width, capCanvas.height);
      } else {
        ctx.fillStyle = "#1d130c";
        ctx.fillRect(0, 0, capCanvas.width, capCanvas.height);
        ctx.fillStyle = "#f5c842";
        ctx.font = "700 64px Poppins";
        ctx.textAlign = "center";
        ctx.fillText("CAMERA STANDBY", capCanvas.width / 2, capCanvas.height / 2);
      }

      return capCanvas.toDataURL("image/jpeg", 0.92);
    }

    function addThumb(photo, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "thumb";
      button.dataset.number = String(index + 1);
      button.dataset.photoId = photo.id;
      button.setAttribute("aria-label", `${index + 1}번째 사진 선택`);
      const img = document.createElement("img");
      img.src = photo.url;
      img.alt = "";
      button.appendChild(img);
      button.addEventListener("click", () => togglePhoto(photo, button));
      thumbs.appendChild(button);
    }

    function syncSelectedThumbs() {
      [...thumbs.children].forEach((item) => {
        const order = selectedPhotos.findIndex((selected) => selected && selected.id === item.dataset.photoId);
        item.classList.toggle("selected", order >= 0);
        if (order >= 0) item.dataset.order = String(order + 1);
        else item.removeAttribute("data-order");
      });
    }

    async function startShooting() {
      if (isShooting) return;

      resetSession();
      isShooting = true;
      startBtn.disabled = true;
      retakeBtn.disabled = true;
      setStep("shoot");

      for (let i = 0; i < currentFrame.shots; i += 1) {
        notice.textContent = `${i + 1} / ${currentFrame.shots} 촬영 준비`;

        for (let count = 5; count > 0; count -= 1) {
          countdownEl.textContent = count;
          await sleep(1000);
        }

        countdownEl.textContent = "BANG";
        flashScreen();
        const photo = {
          id: `shot-${i + 1}-${Date.now()}`,
          url: captureFrame()
        };
        capturedPhotos.push(photo);
        addThumb(photo, i);
        await sleep(520);
        countdownEl.textContent = "";
      }

      isShooting = false;
      startBtn.disabled = false;
      retakeBtn.disabled = false;
      setStep("select");
      notice.textContent = `촬영 완료. 포스터에 넣을 ${currentFrame.selections}장을 순서대로 선택하세요.`;
    }

    function togglePhoto(photo, thumb) {
      if (isShooting) return;

      const selectedIndex = selectedPhotos.findIndex((selected) => selected && selected.id === photo.id);
      if (selectedIndex >= 0) {
        selectedPhotos[selectedIndex] = null;
        thumb.classList.remove("selected");
        thumb.removeAttribute("data-order");
      } else {
        const emptySlot = firstEmptySlot();
        if (emptySlot < 0) {
          notice.textContent = `${currentFrame.selections}장까지 선택할 수 있습니다. 바꾸려면 선택된 사진을 먼저 해제하세요.`;
          return;
        }
        selectedPhotos[emptySlot] = photo;
        thumb.classList.add("selected");
      }

      syncSelectedThumbs();

      const count = selectedCount();
      notice.textContent = count === currentFrame.selections
        ? "포스터가 완성되었습니다. 저장하거나 공유하세요."
        : `${currentFrame.selections - count}장을 더 선택하세요.`;

      if (count === currentFrame.selections) {
        previewPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      } else {
        setStep("select");
      }

      updateReadyState();
      drawPoster();
    }

    function drawPaperTexture(ctx) {
      const posterW = currentFrame.width;
      const posterH = currentFrame.height;
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, posterW, posterH);
    }

    function applyTheme(ctx) {
      const themes = {
        classic: { border: "#f5c842", title: "#f5c842", accent: "#f7efe0", photo: "#ffffff" },
        red: { border: "#b93225", title: "#f7efe0", accent: "#f05a4a", photo: "#ffffff" },
        mono: { border: "#f1eee8", title: "#f1eee8", accent: "#b8b8b8", photo: "#ffffff" }
      };
      return themes[activeTheme] || themes.classic;
    }

    function drawPosterFrame() {
      const posterW = currentFrame.width;
      const posterH = currentFrame.height;
      const theme = applyTheme(finalCtx);
      const titleSize = Math.round(Math.min(120, Math.max(74, posterW * 0.1)));
      const subSize = Math.round(Math.min(44, Math.max(28, posterW * 0.036)));
      const footerSize = Math.round(Math.min(32, Math.max(20, posterW * 0.028)));
      const numberSize = Math.round(Math.min(36, Math.max(24, posterW * 0.032)));
      const titleYMap = {
        single: Math.round(posterH * 0.105),
        strip: Math.round(posterH * 0.09),
        wide: Math.round(posterH * 0.13),
        grid: Math.round(posterH * 0.09),
        mini: Math.round(posterH * 0.085)
      };
      const titleY = titleYMap[currentFrame.layout] || Math.round(posterH * 0.09);
      const deadY = titleY + Math.round(titleSize * 0.55);
      const footerY = currentFrame.layout === "wide" ? Math.round(posterH * 0.925) : posterH - Math.round(posterH * 0.085);
      const numberY = currentFrame.layout === "wide" ? Math.round(posterH * 0.965) : posterH - Math.round(posterH * 0.045);

      finalCanvas.width = posterW;
      finalCanvas.height = posterH;

      drawPaperTexture(finalCtx);

      finalCtx.textAlign = "center";
      finalCtx.fillStyle = theme.title;
      finalCtx.font = `${titleSize}px Rye, serif`;
      finalCtx.fillText("WANTED", posterW / 2, titleY);

      finalCtx.fillStyle = theme.accent;
      finalCtx.font = `${subSize}px Poppins, sans-serif`;
      finalCtx.fillText("DEAD OR ALIVE", posterW / 2, deadY);

      finalCtx.fillStyle = "rgba(247, 239, 224, 0.78)";
      finalCtx.font = `700 ${footerSize}px Poppins, sans-serif`;
      finalCtx.fillText(currentFrame.subtitle, posterW / 2, footerY);

      finalCtx.font = `${numberSize}px Rye, serif`;
      finalCtx.fillText(`NO. ${sessionId.textContent}`, posterW / 2, numberY);
    }

    function getFrameSlotRect(frame, index) {
      const cols = frame.cols;
      const rows = frame.rows;
      const posterW = frame.width;
      const posterH = frame.height;
      const marginXMap = {
        single: 90,
        strip: Math.round(posterW * 0.13),
        wide: Math.round(posterW * 0.055),
        grid: Math.round(posterW * 0.09),
        mini: Math.round(posterW * 0.05)
      };
      const marginX = marginXMap[frame.layout] || Math.round(posterW * 0.09);
      const startYMap = {
        single: Math.round(posterH * 0.22),
        strip: Math.round(posterH * 0.18),
        wide: Math.round(posterH * 0.17),
        grid: Math.round(posterH * 0.18),
        mini: Math.round(posterH * 0.15)
      };
      const bottomMap = {
        single: Math.round(posterH * 0.78),
        strip: Math.round(posterH * 0.88),
        wide: Math.round(posterH * 0.86),
        grid: Math.round(posterH * 0.88),
        mini: Math.round(posterH * 0.91)
      };
      const startY = startYMap[frame.layout] || Math.round(posterH * 0.18);
      const bottomY = bottomMap[frame.layout] || Math.round(posterH * 0.88);
      const gapXMap = { wide: 28, mini: 20 };
      const gapYMap = { wide: 26, mini: 18 };
      const gapX = cols === 1 ? 0 : gapXMap[frame.layout] || 32;
      const gapY = gapYMap[frame.layout] || (rows >= 4 ? Math.round(posterH * 0.012) : Math.round(posterH * 0.024));
      const maxPhotoW = (posterW - marginX * 2 - gapX * (cols - 1)) / cols;
      const maxPhotoH = (bottomY - startY - gapY * (rows - 1)) / rows;
      let photoW = maxPhotoW;
      let photoH = photoW * 0.75;

      if (photoH > maxPhotoH) {
        photoH = maxPhotoH;
        photoW = photoH / 0.75;
      }

      if (frame.layout === "single") {
        photoW = Math.min(posterW * 0.76, maxPhotoW);
        photoH = photoW * 0.75;
      }

      const gridW = photoW * cols + gapX * (cols - 1);
      const gridH = photoH * rows + gapY * (rows - 1);
      const x0 = (posterW - gridW) / 2;
      const y0 = startY + ((bottomY - startY) - gridH) / 2;
      const x = x0 + (index % cols) * (photoW + gapX);
      const y = y0 + Math.floor(index / cols) * (photoH + gapY);
      return { x, y, width: photoW, height: photoH };
    }

    function getPhotoSlotRect(index) {
      return getFrameSlotRect(currentFrame, index);
    }

    function renderFramePreview(canvas, frame) {
      const ctx = canvas.getContext("2d");
      const theme = applyTheme();
      const maxW = 240;
      const maxH = 138;
      const scale = Math.min(maxW / frame.width, maxH / frame.height);
      const titleSize = Math.round(Math.min(120, Math.max(74, frame.width * 0.1)));
      const subSize = Math.round(Math.min(44, Math.max(28, frame.width * 0.036)));
      const titleYMap = {
        single: Math.round(frame.height * 0.105),
        strip: Math.round(frame.height * 0.09),
        wide: Math.round(frame.height * 0.13),
        grid: Math.round(frame.height * 0.09),
        mini: Math.round(frame.height * 0.085)
      };
      const titleY = titleYMap[frame.layout] || Math.round(frame.height * 0.09);

      canvas.width = frame.width;
      canvas.height = frame.height;
      canvas.style.width = `${Math.round(frame.width * scale)}px`;
      canvas.style.height = `${Math.round(frame.height * scale)}px`;
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, frame.width, frame.height);
      ctx.textAlign = "center";
      ctx.fillStyle = theme.title;
      ctx.font = `${titleSize}px Rye, serif`;
      ctx.fillText("WANTED", frame.width / 2, titleY);
      ctx.fillStyle = theme.accent;
      ctx.font = `${subSize}px Poppins, sans-serif`;
      ctx.fillText("DEAD OR ALIVE", frame.width / 2, titleY + Math.round(titleSize * 0.55));

      for (let i = 0; i < frame.selections; i += 1) {
        const rect = getFrameSlotRect(frame, i);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
      }
    }

    function renderFrameCards() {
      frameCards.forEach((card) => {
        const frame = FRAME_PRESETS[card.dataset.frame];
        const sample = card.querySelector(".frame-sample");
        if (!frame || !sample) return;
        const canvas = document.createElement("canvas");
        sample.replaceChildren(canvas);
        renderFramePreview(canvas, frame);
      });
    }

    function drawPhotoSlot(index, image) {
      const theme = applyTheme(finalCtx);
      const { x, y, width: photoW, height: photoH } = getPhotoSlotRect(index);

      finalCtx.save();
      finalCtx.shadowColor = "rgba(0,0,0,0.18)";
      finalCtx.shadowBlur = 10;
      finalCtx.shadowOffsetY = 6;
      finalCtx.fillStyle = theme.photo;
      finalCtx.fillRect(x, y, photoW, photoH);
      finalCtx.restore();

      if (image) {
        const sourceRatio = image.width / image.height;
        const targetRatio = photoW / photoH;
        let sx = 0;
        let sy = 0;
        let sw = image.width;
        let sh = image.height;

        if (sourceRatio > targetRatio) {
          sw = image.height * targetRatio;
          sx = (image.width - sw) / 2;
        } else {
          sh = image.width / targetRatio;
          sy = (image.height - sh) / 2;
        }

        finalCtx.drawImage(image, sx, sy, sw, sh, x, y, photoW, photoH);
      } else {
        finalCtx.fillStyle = "#ffffff";
        finalCtx.fillRect(x, y, photoW, photoH);
        finalCtx.fillStyle = "rgba(0,0,0,0.32)";
        finalCtx.font = "700 54px Poppins, sans-serif";
        finalCtx.fillText(String(index + 1), x + photoW / 2, y + photoH / 2 + 18);
      }
    }

    function removePreviewSelection(index) {
      if (!selectedPhotos[index]) return;

      selectedPhotos[index] = null;
      syncSelectedThumbs();
      setStep("select");
      updateReadyState();
      drawPoster();
      notice.textContent = `${index + 1}번 칸의 사진 선택을 해제했습니다. ${currentFrame.selections - selectedCount()}장을 더 선택하세요.`;
    }

    function getCanvasSlotIndex(event) {
      const bounds = finalCanvas.getBoundingClientRect();
      const scaleX = finalCanvas.width / bounds.width;
      const scaleY = finalCanvas.height / bounds.height;
      const x = (event.clientX - bounds.left) * scaleX;
      const y = (event.clientY - bounds.top) * scaleY;

      for (let i = 0; i < currentFrame.selections; i += 1) {
        const rect = getPhotoSlotRect(i);
        const insideX = x >= rect.x && x <= rect.x + rect.width;
        const insideY = y >= rect.y && y <= rect.y + rect.height;
        if (insideX && insideY) return i;
      }

      return -1;
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function drawPoster() {
      const renderId = ++posterRenderId;
      const slots = selectedPhotos.slice();
      drawPosterFrame();

      const loaded = await Promise.all(slots.map((photo) => photo ? loadImage(photo.url) : Promise.resolve(null)));
      if (renderId !== posterRenderId) return;

      drawPosterFrame();
      for (let i = 0; i < currentFrame.selections; i += 1) {
        drawPhotoSlot(i, loaded[i] || null);
      }
    }

    async function getPosterBlob() {
      await drawPoster();
      return new Promise((resolve) => finalCanvas.toBlob(resolve, "image/png"));
    }

    saveBtn.addEventListener("click", async () => {
      const blob = await getPosterBlob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = `wanted-${currentFrame.id}-${sessionId.textContent}.png`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    });

    shareBtn.addEventListener("click", async () => {
      if (!navigator.share) return;
      try {
        const blob = await getPosterBlob();
        const file = new File([blob], `wanted-${currentFrame.id}-${sessionId.textContent}.png`, { type: "image/png" });
        await navigator.share({ files: [file], title: `WANTED ${currentFrame.label}`, text: "MY WANTED POSTER" });
      } catch (error) {
        notice.textContent = "공유가 취소되었습니다.";
      }
    });

    themeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeTheme = button.dataset.theme;
        themeButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderFrameCards();
        drawPoster();
      });
    });

    frameCards.forEach((button) => {
      button.addEventListener("click", () => applyFrame(button.dataset.frame));
    });

    finalCanvas.addEventListener("click", (event) => {
      const slotIndex = getCanvasSlotIndex(event);
      if (slotIndex >= 0) removePreviewSelection(slotIndex);
    });

    startBtn.addEventListener("click", startShooting);
    retakeBtn.addEventListener("click", resetSession);
    changeFrameBtn.addEventListener("click", showFrameSelect);

    renderFrameCards();
    drawPoster();
  </script>
</body>
</html>
